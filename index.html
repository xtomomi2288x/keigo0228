function lock(ms=5000){
 const l=document.createElement("div");
 l.className="lock";
 document.body.appendChild(l);
 setTimeout(()=>l.remove(),ms);
}

function showMilestone(msg){
 lock(5000);

 const o=document.createElement("div");
 o.className="overlay";
 o.style.background="rgba(0,0,0,0.4)";

 const b=document.createElement("div");
 b.className="box";
 b.textContent=msg;

 o.appendChild(b);
 document.body.appendChild(o);

 setTimeout(()=>o.remove(),5000);
}

function thirdLoop(){
 lock(5000);

 o.style.color="white";

 document.body.appendChild(o);
 setTimeout(()=>o.remove(),5000);
}

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>三輪啓悟ライブラリ</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  line-height: 2;
}

h1 { font-size: 32px; }

#heart {
  cursor: pointer;
  font-size: 50px;
}

#search {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  margin-bottom: 10px;
}

button {
  margin: 5px;
  padding: 8px 12px;
}

details {
  margin: 10px 0;
  padding: 8px;
  background: #f5f5f5;
  border-radius: 8px;
}
</style>
</head>

<body>

<h1 id="mainTitle">🎸三輪啓悟ライブラリ</h1>

<input id="search" placeholder="検索">

<div id="counter">💗 0回</div>
<div id="level">Lv.1（0/150）｜1周目</div>

<div id="heart">💗</div>

<div id="list">
  <details><summary>あ行</summary>ASIAN KUNG-FU GENERATION / 他</details>
  <details><summary>か行</summary>King Gnu / 他</details>
</div>

<script>

/* =====================
データ
===================== */

let heartCount = Number(localStorage.getItem("heartCount")) || 0;

/* =====================
保存
===================== */

function save(){
  localStorage.setItem("heartCount", heartCount);
}

/* =====================
更新
===================== */

function update(){

  document.getElementById("counter").textContent =
    "💗 " + heartCount + "回";

  let level = Math.floor(heartCount / 150) + 1;
  let exp = heartCount % 150;
  let loop = Math.floor((level - 1) / 200);

  document.getElementById("level").textContent =
    "Lv." + level + "（" + exp + "/150）｜" + (loop + 1) + "周目";
}

/* =====================
クリック
===================== */

document.getElementById("heart").onclick = () => {
  heartCount++;
  save();
  update();
};

/* =====================
検索
===================== */

document.getElementById("search").addEventListener("input", function(){
  const val = this.value.toLowerCase();

  document.querySelectorAll("#list details").forEach(d => {
    d.style.display =
      d.textContent.toLowerCase().includes(val)
      ? "block"
      : "none";
  });
});

/* =====================
初期化
===================== */

update();

/* =====================
絶対壊れない処理
===================== */

setInterval(() => {

  document.querySelectorAll("*").forEach(el => {
    const s = getComputedStyle(el);
    const z = Number(s.zIndex);

    const keep =
      el.id === "mainTitle" ||
      el.id === "search" ||
      el.id === "heart" ||
      el.id === "counter" ||
      el.id === "level" ||
      el.id === "list";

    if(!keep && s.position === "fixed" && z >= 999999){
      el.remove();
    }
  });

  document.body.style.pointerEvents = "auto";

}, 2000);

</script>

</body>
</html>
